version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env.example
    environment:
      CHROMA_PERSIST_DIR: /data/chroma_db
      REDIS_URL: redis://redis:6379
      SQLITE_URL: sqlite+aiosqlite:////data/ChatSarathi_analytics.db
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
    depends_on:
      - chromadb
      - redis

  chromadb:
    image: chromadb/chroma:latest
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  backend_data:
  chroma_data:
